    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atlas Miel Auth</title>
    <script>
      (function () {
        var pathname = window.location.pathname;
        var base = pathname.replace(/\/auth\/callback\/?$/, "");
        var target = base + "/auth/callback" + window.location.search + window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
